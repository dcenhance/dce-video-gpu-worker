name: Docker build check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build RunPod worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dce-video-gpu-worker:ci
